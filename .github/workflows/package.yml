name: Build VSIX

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
            - run: npm ci
            - run: npx vsce package
            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: "*.vsix"
